name: shackleton
base: core24
version: 'dev'
summary: A desktop file explorer and photo library manager
description: |
  Shackleton is a desktop file explorer and photo library manager with
  drag-and-drop file management, EXIF/metadata editing via exiftool,
  GPS coordinate viewing, and a SQLite-backed tagging and favourites system.
grade: stable
confinement: strict

apps:
  shackleton:
    command: shackleton
    environment:
      LD_LIBRARY_PATH: $SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib/x86_64-linux-gnu/pulseaudio:$SNAP/usr/lib:$SNAP/lib
    plugs:
      - home
      - removable-media
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - opengl

parts:
  shackleton:
    plugin: dump
    source: build/linux/x64/release/bundle
    stage-packages:
      - libgtk-3-0t64
      - libglib2.0-0t64
      - libgdk-pixbuf-2.0-0
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - libharfbuzz0b
      - libcairo2
      - libcairo-gobject2
      - libatk1.0-0t64
      - libepoxy0
      - libmpv2
      - libfontconfig1
      - libpulse0
