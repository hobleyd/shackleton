name: shackleton-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v6

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION_FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=${VERSION_FULL%%+*}" >> $GITHUB_OUTPUT

      - name: Push version tag
        uses: EndBug/latest-tag@latest
        with:
          tag-name: ${{ steps.version.outputs.version }}

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build macos --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Create DMG
        uses: lethja/create-dmg-action@v0.0.2
        with:
          name: 'shackleton'
          srcdir: 'build/macos/Build/Products/Release/shackleton.app'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: 'shackleton-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: shackleton.dmg

      - name: Create dist structure for desktop_updater
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD_NUMBER="${{ needs.prepare.outputs.build_number }}"
          mkdir -p "dist/${BUILD_NUMBER}/shackleton-${VERSION}+${BUILD_NUMBER}-macos"
          ditto "build/macos/Build/Products/Release/shackleton.app" \
            "dist/${BUILD_NUMBER}/shackleton-${VERSION}+${BUILD_NUMBER}-macos/shackleton.app"

      - name: Generate file hashes
        run: dart run desktop_updater:archive macos

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dist
          path: dist/${{ needs.prepare.outputs.build_number }}/shackleton-${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.build_number }}-macos/

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - run: flutter config --enable-windows-desktop
      - run: flutter create --platforms=windows .
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build windows --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Copy sqlite3.dll
        shell: bash
        run: |
          curl -L -o build/windows/x64/runner/Release/sqlite3.dll \
            "https://github.com/tekartik/sqflite/raw/master/sqflite_common_ffi/lib/src/windows/sqlite3.dll"

      - name: Create Windows installer
        run: dart run windows.dart
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: 'shackleton-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: build/windows/shackleton-${{ needs.prepare.outputs.version }}.exe

      - name: Create dist structure for desktop_updater
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD_NUMBER="${{ needs.prepare.outputs.build_number }}"
          mkdir -p "dist/${BUILD_NUMBER}/shackleton-${VERSION}+${BUILD_NUMBER}-windows"
          cp -r build/windows/x64/runner/Release/. \
            "dist/${BUILD_NUMBER}/shackleton-${VERSION}+${BUILD_NUMBER}-windows/"

      - name: Generate file hashes
        run: dart run desktop_updater:archive windows

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-dist
          path: dist/${{ needs.prepare.outputs.build_number }}/shackleton-${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.build_number }}-windows/

  build-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false

      - run: sudo apt-get update -y
      - run: sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev libmpv2 binutils coreutils desktop-file-utils fakeroot fuse libgdk-pixbuf2.0-dev patchelf python3-pip python3-setuptools squashfs-tools strace util-linux zsync

      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build linux --release --no-tree-shake-icons

      - name: Prepare bundle assets
        run: cp assets/explorer.png build/linux/x64/release/bundle/shackleton.png

      - name: Copy missing libs into bundle
        run: |
          BUNDLE_LIB=build/linux/x64/release/bundle/lib
          copy_if_missing() {
            local lib=$1
            local found=$(find /usr/lib/x86_64-linux-gnu /usr/lib -name "$lib" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              echo "Copying $found"
              cp "$found" "$BUNDLE_LIB/"
            else
              echo "WARNING: $lib not found on host"
            fi
          }
          ldd build/linux/x64/release/bundle/shackleton \
            | grep "not found" \
            | awk '{print $1}' \
            | while read lib; do copy_if_missing "$lib"; done
          for solib in "$BUNDLE_LIB"/*.so*; do
            ldd "$solib" 2>/dev/null \
              | grep "not found" \
              | awk '{print $1}' \
              | while read lib; do copy_if_missing "$lib"; done
          done

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap package
        run: |
          sed -i "s/^version: .*/version: '${{ needs.prepare.outputs.version }}'/" snap/snapcraft.yaml
          snapcraft --destructive-mode

      - name: Upload Snap to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: 'shackleton-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: shackleton_${{ needs.prepare.outputs.version }}_amd64.snap

  deploy:
    needs: [prepare, build-macos, build-windows]
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download macOS distribution
        uses: actions/download-artifact@v8
        with:
          name: macos-dist
          path: deploy/releases/${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.build_number }}-macos/

      - name: Download Windows distribution
        uses: actions/download-artifact@v8
        with:
          name: windows-dist
          path: deploy/releases/${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.build_number }}-windows/

      - name: Update app-archive.json
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD_NUMBER="${{ needs.prepare.outputs.build_number }}"
          DATE=$(date +%Y-%m-%d)
          MACOS_URL="https://hobleyd.github.io/shackleton/releases/${VERSION}+${BUILD_NUMBER}-macos"
          WINDOWS_URL="https://hobleyd.github.io/shackleton/releases/${VERSION}+${BUILD_NUMBER}-windows"

          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RAW_COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" --no-merges)
          else
            RAW_COMMITS=$(git log --pretty=format:"%s" --no-merges | head -30)
          fi
          if [ -n "$RAW_COMMITS" ]; then
            CHANGES=$(echo "$RAW_COMMITS" | jq -R '{"message": .}' | jq -s '.')
          else
            CHANGES='[{"message": "Release '"$VERSION"'"}]'
          fi

          git fetch origin gh-pages 2>/dev/null || true
          git show origin/gh-pages:app-archive.json > current-archive.json 2>/dev/null \
            || echo '{"appName":"Shackleton","description":"Cross-platform desktop file explorer and photo library manager.","items":[]}' > current-archive.json

          jq --arg version "$VERSION" \
             --argjson short_version "$BUILD_NUMBER" \
             --arg date "$DATE" \
             --arg macos_url "$MACOS_URL" \
             --arg windows_url "$WINDOWS_URL" \
             --argjson changes "$CHANGES" \
             '.items = (
               [.items[] | select(
                 (.shortVersion == $short_version and (.platform == "macos" or .platform == "windows")) | not
               )]
               + [
                 {
                   "version": $version,
                   "shortVersion": $short_version,
                   "changes": $changes,
                   "date": $date,
                   "mandatory": false,
                   "url": $macos_url,
                   "platform": "macos"
                 },
                 {
                   "version": $version,
                   "shortVersion": $short_version,
                   "changes": $changes,
                   "date": $date,
                   "mandatory": false,
                   "url": $windows_url,
                   "platform": "windows"
                 }
               ]
             )' current-archive.json > deploy/app-archive.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
