name: shackleton-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v7

      - name: Get version from pubspec.yaml
        id: version
        run: |
          VERSION_FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=${VERSION_FULL%%+*}" >> $GITHUB_OUTPUT

      - name: Push version tag
        uses: EndBug/latest-tag@latest
        with:
          tag-name: ${{ steps.version.outputs.version }}

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build macos --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Create DMG
        uses: lethja/create-dmg-action@v0.0.2
        with:
          name: 'shackleton'
          srcdir: 'build/macos/Build/Products/Release/shackleton.app'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: 'shackleton-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: shackleton.dmg

      - name: Package for desktop_updater
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD_NUMBER="${{ needs.prepare.outputs.build_number }}"
          ARTIFACT_URL="https://hobleyd.github.io/shackleton/releases/${VERSION}+${BUILD_NUMBER}-macos/shackleton-${VERSION}-macos.zip"
          dart run desktop_updater:package \
            --input "build/macos/Build/Products/Release/shackleton.app" \
            --output "dist/${BUILD_NUMBER}/macos" \
            --package-id "com.example.shackleton" \
            --app-name "shackleton" \
            --version "${VERSION}" \
            --build-number "${BUILD_NUMBER}" \
            --platform macos \
            --artifact-url "${ARTIFACT_URL}"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dist
          path: dist/${{ needs.prepare.outputs.build_number }}/macos/

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - run: flutter config --enable-windows-desktop
      - run: flutter create --platforms=windows .
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build windows --release --no-tree-shake-icons --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Copy sqlite3.dll
        shell: bash
        run: |
          curl -L -o build/windows/x64/runner/Release/sqlite3.dll \
            "https://github.com/tekartik/sqflite/raw/master/sqflite_common_ffi/lib/src/windows/sqlite3.dll"

      - name: Create Windows installer
        run: dart run windows.dart
        env:
          VERSION: ${{ needs.prepare.outputs.version }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: 'shackleton-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: build/windows/shackleton-${{ needs.prepare.outputs.version }}.exe

      - name: Package for desktop_updater
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD_NUMBER="${{ needs.prepare.outputs.build_number }}"
          ARTIFACT_URL="https://hobleyd.github.io/shackleton/releases/${VERSION}+${BUILD_NUMBER}-windows/shackleton-${VERSION}-windows.zip"
          dart run desktop_updater:package \
            --input "build/windows/x64/runner/Release" \
            --output "dist/${BUILD_NUMBER}/windows" \
            --package-id "com.example.shackleton" \
            --app-name "shackleton" \
            --version "${VERSION}" \
            --build-number "${BUILD_NUMBER}" \
            --platform windows \
            --artifact-url "${ARTIFACT_URL}"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-dist
          path: dist/${{ needs.prepare.outputs.build_number }}/windows/

  build-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false

      - run: sudo apt-get update -y
      - run: sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev libmpv2 binutils coreutils desktop-file-utils fakeroot fuse libgdk-pixbuf2.0-dev patchelf python3-pip python3-setuptools squashfs-tools strace util-linux zsync

      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux .
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build linux --release --no-tree-shake-icons

      - name: Prepare bundle assets
        run: cp assets/explorer.png build/linux/x64/release/bundle/shackleton.png

      - name: Copy missing libs into bundle
        run: |
          BUNDLE_LIB=build/linux/x64/release/bundle/lib
          copy_if_missing() {
            local lib=$1
            local found=$(find /usr/lib/x86_64-linux-gnu /usr/lib -name "$lib" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              echo "Copying $found"
              cp "$found" "$BUNDLE_LIB/"
            else
              echo "WARNING: $lib not found on host"
            fi
          }
          ldd build/linux/x64/release/bundle/shackleton \
            | grep "not found" \
            | awk '{print $1}' \
            | while read lib; do copy_if_missing "$lib"; done
          for solib in "$BUNDLE_LIB"/*.so*; do
            ldd "$solib" 2>/dev/null \
              | grep "not found" \
              | awk '{print $1}' \
              | while read lib; do copy_if_missing "$lib"; done
          done

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Build Snap package
        run: |
          sed -i "s/^version: .*/version: '${{ needs.prepare.outputs.version }}'/" snap/snapcraft.yaml
          snapcraft --destructive-mode

      - name: Upload Snap to GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: 'shackleton-${{ needs.prepare.outputs.version }}'
          tag_name: ${{ needs.prepare.outputs.version }}
          files: shackleton_${{ needs.prepare.outputs.version }}_amd64.snap

  deploy:
    needs: [prepare, build-macos, build-windows]
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download macOS distribution
        uses: actions/download-artifact@v8
        with:
          name: macos-dist
          path: deploy/releases/${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.build_number }}-macos/

      - name: Download Windows distribution
        uses: actions/download-artifact@v8
        with:
          name: windows-dist
          path: deploy/releases/${{ needs.prepare.outputs.version }}+${{ needs.prepare.outputs.build_number }}-windows/

      - name: Update app-archive.json
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD_NUMBER="${{ needs.prepare.outputs.build_number }}"
          MACOS_RELEASE_URL="https://hobleyd.github.io/shackleton/releases/${VERSION}+${BUILD_NUMBER}-macos/release.json"
          WINDOWS_RELEASE_URL="https://hobleyd.github.io/shackleton/releases/${VERSION}+${BUILD_NUMBER}-windows/release.json"

          git fetch origin gh-pages 2>/dev/null || true
          git show origin/gh-pages:app-archive.json > current-archive.json 2>/dev/null \
            || echo '{"schemaVersion":3,"appName":"Shackleton","items":[]}' > current-archive.json

          jq --arg version "$VERSION" \
             --argjson build_number "$BUILD_NUMBER" \
             --arg macos_release_url "$MACOS_RELEASE_URL" \
             --arg windows_release_url "$WINDOWS_RELEASE_URL" \
             '.schemaVersion = 3 |
              .appName = "Shackleton" |
              .items = (
                [.items[] |
                  select(has("release")) |
                  select((.buildNumber == $build_number and (.platform == "macos" or .platform == "windows")) | not)
                ]
                + [
                  {
                    "version": $version,
                    "buildNumber": $build_number,
                    "platform": "macos",
                    "channel": "stable",
                    "mandatory": false,
                    "release": $macos_release_url
                  },
                  {
                    "version": $version,
                    "buildNumber": $build_number,
                    "platform": "windows",
                    "channel": "stable",
                    "mandatory": false,
                    "release": $windows_release_url
                  }
                ]
              )' current-archive.json > deploy/app-archive.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
