name: shackleton-linux-ci

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
      - name: Get App version
        uses: mikefarah/yq@master
        with:
          cmd: echo "VERSION=$(yq .version pubspec.yaml)" >> $GITHUB_ENV
      - name: "Push version tag from pubspec.yaml"
        uses: EndBug/latest-tag@latest
        with:
          tag-name: ${{ env.VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false
      - run: sudo apt-get update -y
      - run: sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev libmpv2 binutils coreutils desktop-file-utils fakeroot fuse libgdk-pixbuf2.0-dev patchelf python3-pip python3-setuptools squashfs-tools strace util-linux zsync
      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux .
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - run: flutter build linux --release --no-tree-shake-icons
      - name: Prepare bundle assets
        run:
          cp assets/explorer.png build/linux/x64/release/bundle/shackleton.png
      - name: Copy missing libs into bundle
        run: |
          BUNDLE_LIB=build/linux/x64/release/bundle/lib
          copy_if_missing() {
            local lib=$1
            local found=$(find /usr/lib/x86_64-linux-gnu /usr/lib -name "$lib" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              echo "Copying $found"
              cp "$found" "$BUNDLE_LIB/"
            else
              echo "WARNING: $lib not found on host"
            fi
          }
          # Run ldd and copy everything flagged as not found
          ldd build/linux/x64/release/bundle/shackleton \
            | grep "not found" \
            | awk '{print $1}' \
            | while read lib; do copy_if_missing "$lib"; done
          for solib in "$BUNDLE_LIB"/*.so*; do
            ldd "$solib" 2>/dev/null \
              | grep "not found" \
              | awk '{print $1}' \
              | while read lib; do copy_if_missing "$lib"; done
          done
      - name: Copy missing libs into bundle
        run: |
          BUNDLE_LIB=build/linux/x64/release/bundle/lib
          copy_if_missing() {
            local lib=$1
            local found=$(find /usr/lib/x86_64-linux-gnu /usr/lib -name "$lib" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              echo "Copying $found"
              cp "$found" "$BUNDLE_LIB/"
            else
              echo "WARNING: $lib not found on host"
            fi
          }
          # Run ldd and copy everything flagged as not found
          ldd build/linux/x64/release/bundle/shackleton \
            | grep "not found" \
            | awk '{print $1}' \
            | while read lib; do copy_if_missing "$lib"; done
          for solib in "$BUNDLE_LIB"/*.so*; do
            ldd "$solib" 2>/dev/null \
              | grep "not found" \
              | awk '{print $1}' \
              | while read lib; do copy_if_missing "$lib"; done
          done
      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Configure Flatpak runtime
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Create Flatpak bundle
        run: |
          cat > au.com.sharpblue.shackleton.yaml <<'EOF'
          app-id: au.com.sharpblue.shackleton
          runtime: org.freedesktop.Platform
          runtime-version: '24.08'
          sdk: org.freedesktop.Sdk
          command: shackleton
          add-extensions:
                org.freedesktop.Platform.ffmpeg-full:
                  directory: lib/ffmpeg
                  version: '24.08'
                  add-ld-path: .
          finish-args:
            - --share=ipc
            - --socket=fallback-x11
            - --socket=wayland
            - --device=dri
            - --filesystem=home
            - --env=LD_LIBRARY_PATH=/app/lib:/app/lib64
          modules:
            - name: libplacebo
              buildsystem: meson
              config-opts:
                - -Dvulkan=disabled
                - -Dd3d11=disabled
                - -Ddemos=false
                - --prefix=/app
              sources:
                - type: git
                  url: https://github.com/haasn/libplacebo.git
                  tag: v6.338.2
            - name: libass
              buildsystem: autotools
              sources:
                - type: git
                  url: https://github.com/libass/libass.git
                  tag: 0.17.3
            - name: mpv
              buildsystem: meson
              build-options:
                env:
                  PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/lib64/pkgconfig
              config-opts:
                - -Dlibmpv=true
                - -Dcplayer=false
                - -Dtests=false
                - -Dmanpage-build=disabled
                - -Dcdda=disabled
                - -Ddvdnav=disabled
              sources:
                - type: archive
                  url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.41.0.tar.gz
                  sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209
            - name: shackleton
              buildsystem: simple
              build-commands:
                - install -Dm755 shackleton /app/bin/shackleton
                - cp -r lib /app/lib
                - cp -r data /app/data
                - mkdir -p /app/lib/ffmpeg
                - install -Dm644 au.com.sharpblue.shackleton.desktop /app/share/applications/au.com.sharpblue.shackleton.desktop
                - install -Dm644 shackleton.png /app/share/icons/hicolor/512x512/apps/au.com.sharpblue.shackleton.png
              sources:
                - type: dir
                  path: build/linux/x64/release/bundle
                - type: file
                  path: au.com.sharpblue.shackleton.desktop
          EOF
          
          cat > au.com.sharpblue.shackleton.desktop <<'EOF'
          [Desktop Entry]
          Name=Shackleton
          Exec=Shackleton
          Type=Application
          Categories=Office;Education;
          Icon=au.com.sharpblue.shackleton
          Terminal=false
          EOF
          
          flatpak-builder --force-clean --repo=repo build-dir au.com.sharpblue.shackleton.yaml
          flatpak build-bundle repo shackleton-${VERSION}-linux-x86_64.flatpak au.com.sharpblue.shackleton
      - name: Upload Linux Flatpak to Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ env.VERSION }}
          files: shackleton-${{ env.VERSION }}-linux-x86_64.flatpak
